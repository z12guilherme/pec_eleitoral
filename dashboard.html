<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PEC da Governança</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4rem;
            text-align: center;
            margin: 4rem auto;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .sig-count {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
            margin: 1.5rem 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <header style="justify-content: flex-start;">
            <a href="index.html" style="text-decoration: none; display: inline-block;">
                <div class="toggle-btn active" style="background: var(--bg-card); border: 1px solid var(--border);"><i
                        class="fas fa-arrow-left" style="margin-right: 0.5rem;"></i> Voltar para o Início</div>
            </a>
        </header>

        <div class="dashboard-card reveal">
            <i class="fas fa-users" style="font-size: 3.5rem; color: var(--secondary); margin-bottom: 1rem;"></i>
            <h2>Assinaturas Registradas</h2>
            <div class="sig-count" id="signature-count">0</div>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem;">Cidadãos já apoiaram
                oficialmente a PEC da
                Governança. Juntos somos mais fortes!</p>

            <a href="https://docs.google.com/spreadsheets/d/1d0ZyLXs3N5QSrklPS9LW068-ntGmf6Es7hDd9DI2kps/edit?gid=0#gid=0"
                target="_blank" class="cta-button"
                style="background: transparent; border: 2px solid var(--secondary); color: var(--secondary); font-size: 0.95rem; padding: 0.8rem 1.5rem;">
                <i class="fas fa-lock-open" style="margin-right: 0.5rem;"></i> Acessar Planilha Pública (Auditoria)
            </a>
        </div>
    </div>
    <script src="js/dashboard.js"></script>
</body>

</html>
